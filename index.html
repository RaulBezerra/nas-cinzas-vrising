<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Nas Cinzas — V Rising</title>
	<link rel="stylesheet" href="style.css?v=22">
</head>
<body>
	<header>
		<h1>Nas Cinzas — V Rising</h1>
		<p class="subtitle">Protótipo de mecânica de combate</p>
		<nav class="main-nav">
			<a href="index.html" class="active">Jogo</a>
			<a href="weapons.html">Armas</a>
			<a href="schools.html">Escolas</a>
			<a href="characters.html">Personagens</a>
			<a href="blood-types.html">Sangue</a>
			<a href="vampire-powers.html">Poderes Vampíricos</a>
			<a href="map-editor.html">Mapas</a>
		</nav>
	</header>

	<main>
		<section class="card-grid-wrapper">
			<div class="char-bar">
				<span class="char-bar-label">Personagem</span>
				<select id="char-select" class="char-select"></select>
				<a href="characters.html" class="char-bar-link">Gerenciar</a>
			</div>
			<div class="status-bar">
				<h2>Mão do jogador</h2>
				<div class="selection-info">
					<span class="selection-label">Selecionadas</span>
					<span id="selection-counter" class="selection-counter">0 / 3</span>
					<button id="reset-btn" class="reset-btn">Limpar</button>
				</div>
			</div>
			<div id="card-grid" class="card-grid">
				<!-- cartas renderizadas via JS -->
			</div>
		</section>

		<section class="board-wrapper">
			<div class="board-header">
				<h2 class="section-title">Tabuleiro</h2>
				<select id="map-select" class="map-select"></select>
			</div>
			<svg id="board" class="board" xmlns="http://www.w3.org/2000/svg"></svg>
		</section>
	</main>

	<script src="effects.js?v=13"></script>
	<script src="app.js?v=24"></script>
	<script src="board.js?v=2"></script>
</body>
</html>
