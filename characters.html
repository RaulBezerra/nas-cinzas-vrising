<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<title>Personagens — Nas Cinzas V Rising</title>
	<link rel="stylesheet" href="style.css">
	<style>
		.main-nav { display: flex; gap: 0.5rem; padding: 0.5rem 1.5rem; border-top: 1px solid #3a1a1a; }
		.main-nav a { color: #888; text-decoration: none; padding: 0.4rem 0.9rem; border-radius: 4px; font-size: 0.9rem; letter-spacing: 0.05em; }
		.main-nav a:hover { background: #1a0a0a; color: #ddd; }
		.main-nav a.active { color: #ff4444; border-bottom: 2px solid #ff4444; }

		.library { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
		.library-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; }
		.library-card { background: #1a0a0a; border: 1px solid #3a1a1a; border-radius: 6px; padding: 1rem; }
		.library-card-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #3a1a1a; }
		.library-card-icon { width: 48px; height: 48px; border: 1px dashed #4a2a2a; border-radius: 4px; flex-shrink: 0; }
		.library-card-header h3 { margin: 0; flex: 1; font-size: 1.1rem; color: #eee; }
		.library-card-id { color: #777; font-size: 0.75rem; font-family: monospace; }

		.character-section { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px dashed #2a1414; }
		.character-section:first-of-type { border-top: none; padding-top: 0; }
		.character-section h4 { font-size: 0.7rem; text-transform: uppercase; color: #888; margin: 0 0 0.3rem 0; letter-spacing: 0.06em; }
		.character-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0.5rem; background: #220e0e; border-radius: 4px; margin-bottom: 0.25rem; }
		.character-row:last-child { margin-bottom: 0; }
		.character-row-icon { width: 28px; height: 28px; border: 1px dashed #4a2a2a; border-radius: 3px; flex-shrink: 0; }
		.character-row-name { flex: 1; font-size: 0.9rem; color: #ddd; }
		.character-row-tag { color: #777; font-size: 0.7rem; font-family: monospace; }
	</style>
</head>
<body>
	<header>
		<h1>Nas Cinzas <span style="color:#ff4444">→</span> V Rising</h1>
		<nav class="main-nav">
			<a href="index.html">Jogo</a>
			<a href="weapons.html">Armas</a>
			<a href="schools.html">Escolas</a>
			<a href="characters.html" class="active">Personagens</a>
		</nav>
	</header>
	<main>
		<section class="library">
			<h2 class="section-title">Biblioteca de Personagens</h2>
			<div id="characters-list" class="library-list"></div>
		</section>
	</main>
	<script src="effects.js"></script>
	<script src="characters.js"></script>
</body>
</html>
